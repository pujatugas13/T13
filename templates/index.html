<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deteksi Kepadatan Lalu Lintas</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-cream: #FEFEF2;
            --main-slate: #929FC1;
            --accent-yellow: #F2D965;
            --dark-text: #2B3A4A;
        }

        body {
            background-color: var(--bg-cream);
            color: var(--dark-text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        .main-card {
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border: 2px solid var(--main-slate);
            overflow: hidden;
        }

        .card-header-custom {
            background-color: var(--main-slate);
            color: #ffffff;
            padding: 24px;
            text-align: center;
        }

        .btn-custom {
            background-color: var(--accent-yellow);
            color: var(--dark-text);
            font-weight: 700;
            border: none;
            padding: 12px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .btn-custom:hover {
            background-color: #e5c94c;
            color: var(--dark-text);
            transform: translateY(-2px);
        }

        .result-box {
            background-color: var(--bg-cream);
            border-left: 6px solid var(--accent-yellow);
            border-radius: 8px;
            padding: 18px;
        }

        .badge-confidence {
            background-color: var(--main-slate);
            color: #ffffff;
            font-size: 0.9rem;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-6">
                <div class="main-card">
                    <div class="card-header-custom">
                        <h4 class="fw-bold mb-1">Klasifikasi Kepadatan Lalu Lintas</h4>
                        <p class="mb-0 text-white-50 fs-6">Transfer Learning MobileNetV2</p>
                    </div>
                    
                    <div class="card-body p-4">
                        <form action="/" method="post" enctype="multipart/form-data">
                            <div class="mb-4">
                                <label for="file" class="form-label fw-bold">Unggah Gambar Jalan Raya</label>
                                <input class="form-control border-2" type="file" id="file" name="file" accept="image/*" required>
                            </div>
                            <button type="submit" class="btn btn-custom w-100">Analisis Gambar</button>
                        </form>

                        {% if label %}
                        <div class="result-box mt-4">
                            <p class="mb-1 text-muted fs-6 fw-semibold">Hasil Deteksi:</p>
                            <h4 class="fw-bold mb-2" style="color: var(--dark-text);">{{ label }}</h4>
                            <span class="badge badge-confidence px-3 py-2">Tingkat Kepercayaan: {{ confidence }}%</span>
                        </div>
                        {% endif %}

                        {% if error %}
                        <div class="alert alert-danger mt-4 border-0" role="alert">
                            {{ error }}
                        </div>
                        {% endif %}
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
